services:
  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    depends_on:
      client:
        condition: service_healthy
      admin:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      product-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    environment:
      CADDY_EMAIL: ${CADDY_EMAIL:-admin@spacefly.ai}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - spacefly

volumes:
  caddy_data:
  caddy_config:
